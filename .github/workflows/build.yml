name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore BlogSystem.sln
      working-directory: src

    - name: Build
      run: dotnet build BlogSystem.sln --no-restore --configuration Release
      working-directory: src

    - name: Test
      run: dotnet test BlogSystem.sln --no-build --configuration Release
      working-directory: src
